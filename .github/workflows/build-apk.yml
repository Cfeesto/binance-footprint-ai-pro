name: Build & Release APK

on:
  push:
    branches: [main, master, dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Python for Backend
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Backend Dependencies
        run: pip install -r backend/requirements.txt

      - name: Start Backend Service (Simulated Deployment)
        run: | 
          nohup uvicorn backend.main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
          echo "BACKEND_URL=http://localhost:8000" >> $GITHUB_ENV

      - name: Decode keystore
        run: python3 -c "import base64,os; open('android/app/release.jks','wb').write(base64.b64decode(os.environ['KS']))"
        env:
          KS: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build release APK
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            -PbackendUrl=$BACKEND_URL

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Release build #${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/app-release.apk
